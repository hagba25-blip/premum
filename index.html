<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trick Brain</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg,#74ebd5,#ACB6E5);
      text-align:center;
      padding:20px;
      margin:0;
    }

    #app {
      max-width:450px;
      margin:auto;
      background:white;
      padding:25px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.15);
      animation:fadeIn 0.6s ease;
    }

    h1 {
      color:#0077b6;
      margin-bottom:10px;
    }

    #question {
      font-size:20px;
      font-weight:bold;
      margin:20px 0;
      padding:15px;
      background:#f0f9ff;
      border-radius:15px;
      animation:pop 0.4s;
    }

    #answers {
      background:#fafafa;
      padding:10px;
      border-radius:15px;
    }

    button {
      width:100%;
      padding:15px;
      margin:10px 0;
      border:none;
      border-radius:15px;
      background:linear-gradient(135deg,#4A90E2,#357ABD);
      color:white;
      font-size:16px;
      transition:0.3s;
      cursor:pointer;
    }

    button:hover { transform:scale(1.05); }
    button:active { transform:scale(0.95); }

    #feedback {
      min-height:60px;
      font-weight:bold;
      font-size:18px;
      margin-top:15px;
    }

    #nextBtn { background:#9b59b6; display:none; }
    #shareBtn { background:#2ECC71; margin-top:20px; }

    .modal {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      z-index:1000;
    }

    .modal-content {
      background:white;
      padding:20px;
      margin:10% auto;
      width:90%;
      max-width:500px;
      border-radius:15px;
      animation:pop 0.4s;
      text-align:center;
    }

    .success { color:#2ECC71; animation:pop 0.5s; }
    .error { color:#E74C3C; animation:shake 0.3s; }

    @keyframes pop {
      0% { transform:scale(0.8); opacity:0; }
      100% { transform:scale(1); opacity:1; }
    }
    @keyframes shake {
      0%,100% { transform:translateX(0); }
      25% { transform:translateX(-5px); }
      75% { transform:translateX(5px); }
    }
    @keyframes fadeIn {
      from { opacity:0; }
      to { opacity:1; }
    }

    #diplomaContent {
      border: 8px solid gold;          /* cadre doré */
      border-radius: 15px;
      padding: 20px;
      background: #fffdf5;             /* fond légèrement ivoire */
      box-shadow: 0 8px 25px rgba(0,0,0,0.25); /* ombre douce */
      font-family: 'Georgia', serif;   /* police élégante */
      max-width: 95%;                  /* largeur fluide pour mobile */
      margin: auto;
    }

    #diplomaContent h2 {
      color: #b8860b;                  /* doré foncé pour le titre */
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
      font-size: 1.4rem;
    }

    #diplomaContent p {
      font-size: 1.1rem;
      margin: 8px 0;
      line-height: 1.4;
    }

    .diploma-buttons {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
    }
    .diploma-buttons button {
      flex: 1;
      margin: 0 5px;
      padding: 10px;
      border-radius: 10px;
      font-weight: 600;
    }

    #topBar {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 2000;
    }

    #settingsBtn {
      background: #34495e;
      color: white;
      border: none;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    #settingsBtn:hover { background:#2c3e50; transform:scale(1.1); }

    #soundToggleBtn {
      background:#2980b9;
      color:white;
      border:none;
      border-radius:10px;
      padding:12px;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    #soundToggleBtn:hover { background:#3498db; }
    
    /* 📱 Adaptation mobile */
    @media(max-width:600px){
      #settingsBtn {
        width: 40px;
        height: 40px;
        font-size: 18px;
      }
      #soundToggleBtn {
        font-size: 14px;
        padding: 10px;
      }
    }

    @media(max-width:600px){
      h1 { font-size:1.4rem; }
      #question { font-size:1rem; }
      button { font-size:18px; }
      #app { padding:15px; }
      .modal-content { margin:25% auto; }
    }

    /* 📱 Adaptation mobile */
    @media(max-width:600px){
      #diplomaContent {
        padding: 15px;
        border-width: 6px;             /* cadre plus fin sur mobile */
      }
      #diplomaContent h2 {
        font-size: 1.2rem;
      }
      #diplomaContent p {
        font-size: 1rem;
      }
      #diplomaContent img {
        width: 60px;                   /* image réduite mais visible */
        height: 60px;
      }
    }
  </style>
</head>

        { q:"Choisis le mot qui change selon ton point de vue", a:["gauche","droite","devant","derrière"], c:"devant", exp:"Ce qui est 'devant' dépend de ton orientation." },

        // 174
        { q:"Quel mot est le plus neutre ?", a:["objet","amour","haine","joie"], c:"objet", exp:"Un objet est neutre, contrairement aux émotions." },

        // 175
        { q:"Clique sur la réponse qui dépend de la perception", a:["couleur","pierre","bois","fer"], c:"couleur", exp:"La perception des couleurs dépend de l’œil humain." },

        // 176
        { q:"Choisis la réponse qui est une convention", a:["heure","temps","jour","nuit"], c:"heure", exp:"L’heure est une convention humaine pour mesurer le temps." },

        // 177
        { q:"Quel mot peut être silencieux et bruyant ?", a:["musique","silence","bruit","son"], c:"musique", exp:"La musique peut être douce (silencieuse) ou forte (bruyante)." },

        // 178
        { q:"Clique sur la réponse qui est relative", a:["grand","table","fils","porte"], c:"grand", exp:"La notion de 'grand' est relative selon la comparaison." },

        // 179
        { q:"Choisis la réponse qui dépend d’une règle humaine", a:["langue","air","eau","feu"], c:"langue", exp:"Les langues sont des règles humaines, les autres sont naturels." },

        // 180
        { q:"Quel mot change selon la culture ?", a:["politesse","décision","intéligence","silence"], c:"politesse", exp:"La politesse varie selon les cultures." },

        // 181
        { q:"Clique sur la réponse qui est une construction mentale", a:["nombre","pierre","choix","cerveau"], c:"nombre", exp:"Un nombre est une construction abstraite créée par l’esprit, contrairement aux objets physiques." },

        // 182
        { q:"Choisis la réponse qui peut être infinie sans être physique", a:["suite","ligne","route","cercle"], c:"suite", exp:"Une suite mathématique peut être infinie sans exister physiquement." },

        // 183
        { q:"Quel mot est le plus dépendant du langage ?", a:["mot","écrit","eau","air"], c:"mot", exp:"Le mot est une unité de langage, il dépend entièrement de la langue." },

        // 184
        { q:"Clique sur la réponse qui est une abstraction pure", a:["justice","table","injustice","maniers"], c:"justice", exp:"La justice est une abstraction, contrairement aux objets concrets." },

        // 185
        { q:"Choisis la réponse qui n’a pas de forme fixe", a:["nuage","chocolat","monde","l'eau"], c:"nuage", exp:"Un nuage change constamment de forme, contrairement aux objets solides." },

        // 186
        { q:"Quel mot dépend entièrement de l’observateur ?", a:["beau","apprécier","comportement","déclaration"], c:"beau", exp:"La beauté dépend du regard et de la perception de l’observateur." },

        // 187
        { q:"Clique sur la réponse qui n’existe que si définie", a:["concept","faux","abservation","payer"], c:"concept", exp:"Un concept n’existe que lorsqu’il est défini par l’esprit." },

        // 188
        { q:"Choisis la réponse qui dépend d’un système", a:["règle","air","eau","feu"], c:"règle", exp:"Une règle est créée par un système humain, contrairement aux éléments naturels." },

        // 189
        { q:"Quel mot est une pure relation ?", a:["entre","collaborer","tout","a peu prés"], c:"entre", exp:"Le mot 'entre' exprime une relation, pas un objet." },

        // 190
        { q:"Clique sur la réponse qui dépend uniquement de l’interprétation", a:["sens","question","reponse","imposer"], c:"sens", exp:"Le 'sens' varie selon l’interprétation, contrairement aux objets physiques." },

        // 191
        { q:"Clique sur le bouton bleu", a:["Bouton bleu écrit","Bouton bleu"," ","Aucun bouton bleu"], c:" ", exp:"Le 'bouton bleu vide' est le vrai bouton." }
    ];

    let currentLevel=1;
    let correctCount=0;
    let used=[]; let current;

    function randomLevel(){
      let i;
      do{i=Math.floor(Math.random()*levels.length);}while(used.includes(i));
      used.push(i);
      return levels[i];
    }

    function loadLevelData(){
      current=randomLevel();
      document.getElementById("level").innerText="Niveau "+currentLevel;
      document.getElementById("question").innerText=current.q;
      let box=document.getElementById("answers");
      box.innerHTML="";
      current.a.forEach(a=>{
        let b=document.createElement("button");
        b.innerText=a;
        b.onclick=()=>checkAnswer(a);
        box.appendChild(b);
      });
    }

    function checkAnswer(ans){
        // Désactiver tous les boutons dès qu'une réponse est choisie
      let buttons = document.querySelectorAll("#answers button");
      buttons.forEach(btn => {
        btn.disabled = true;
        btn.style.opacity = "0.6"; // style visuel pour montrer qu'ils sont désactivés
        btn.style.cursor = "not-allowed";
      });
      if(ans===current.c){
        correctCount++;
        showFeedback("🎉 Bravo. Félicitations vous avez trouvé la bonne réponse",true);
        launchConfetti();
        playSound(winSound); // 🔊 jouer son de victoire
        document.getElementById("nextBtn").style.display="block";
      }else{
        showFeedback("❌ Mauvaise réponse\nRéponse: "+current.c+"\n"+current.exp,false);
        playSound(loseSound); // 🔊 jouer son d’échec
        document.getElementById("nextBtn").style.display="block";
      }
    }

    function showFeedback(msg,ok){
      let f=document.getElementById("feedback");
      f.innerText=msg;
      f.className=ok?"success":"error";
    }

    document.getElementById("nextBtn").onclick=()=>{
      if(currentLevel % 10 === 0){
        playSound(diploSound); // 🔊 jouer le son du diplôme
        document.getElementById("certificateModal").style.display="block";
      }else{
        currentLevel++;
        loadLevelData();
        document.getElementById("nextBtn").style.display="none";
      }
    };

    function generateCertificate(){
      let name=document.getElementById("playerName").value||"Joueur";
      let score=correctCount+"/"+currentLevel;
      let ratio=correctCount/currentLevel;
      let message="";

      if(ratio>=0.9) message="🌟 Génie absolu ! Ton cerveau est une arme secrète.";
      else if(ratio>=0.7) message="👏 Très intelligent, continue comme ça !";
      else if(ratio>=0.5) message="🙂 Pas mal, mais tu peux faire mieux.";
      else if(ratio>=0.3) message="😅 Oups… ton cerveau a besoin d’un café.";
      else message="🙈 Très insuffisant… mais courage, même les génies ont commencé par se tromper !";
      // ✅ Ajout de messages spécifiques selon le palier atteint
      if(currentLevel === 10){
      message += "\n🎯 Première étape franchie ! Tu viens de décrocher ton premier diplôme Trick Brain.";
      }
      else if(currentLevel === 20){
        message += "\n🏆 Deuxième palier atteint ! Tu prouves ta régularité et ton endurance intellectuelle.";
      }
      else if(currentLevel === 30){
        message += "\n🚀 Troisième palier ! Tu montres une progression impressionnante, continue à repousser tes limites.";
      }
      else if(currentLevel === 40){
        message += "\n🌟 Quatrième palier ! Tu es désormais un vétéran du Trick Brain, ton esprit est affûté.";
      }
      else if(currentLevel === 50){
        message += "\n👑 Cinquième palier ! Tu fais partie des élites, ton parcours est remarquable.";
      }
      let diplomaHTML=`
        <h2>🎓 Diplôme Trick Brain</h2>
        <p><strong>Nom :</strong> ${name}</p>
        <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" alt="Lion" style="width:80px;height:80px;margin:10px;" crossorigin="anonymous">
        <p><strong>Score :</strong> ${score}</p>
        <p>${message}</p>
        <div class="diploma-buttons">
          <button onclick="saveDiploma()">💾 Enregistrer</button>
          <button onclick="shareDiploma()">📤 Partager</button>
          <button onclick="continueGame()">▶️ Continuer</button>
        </div>
      `;
      document.getElementById("diplomaContent").innerHTML=diplomaHTML;
      document.getElementById("certificateModal").style.display="none";
      document.getElementById("diplomaModal").style.display="block";

      launchConfetti(); // 🎉 confettis au moment du diplôme
    }

    // 🎉 Confettis
    function launchConfetti() {
      const duration = 2 * 1000;
      const end = Date.now() + duration;

      (function frame() {
        confetti({
          particleCount: 5,
          angle: 60,
          spread: 55,
          origin: { x: 0 }
        });
        confetti({
          particleCount: 5,
          angle: 120,
          spread: 55,
          origin: { x: 1 }
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      })();
    }
    // 💾 Enregistrer le diplôme en image
    // 💾 Enregistrer le diplôme en image bien nette
    function saveDiploma(){
      html2canvas(document.querySelector("#diplomaContent"), {
        useCORS: true,       // permet de charger correctement les images externes
        scale: 3,            // augmente la résolution pour plus de netteté
        backgroundColor: "#ffffff" // fond blanc pour un rendu clair
      }).then(canvas=>{
        let link = document.createElement("a");
        link.download = "Diplome_TrickBrain.png";
        link.href = canvas.toDataURL("image/png", 1.0); // qualité maximale
        link.click();
      });
    }

    // 📤 Partager le diplôme en image
    function shareDiploma(){
      html2canvas(document.querySelector("#diplomaContent")).then(canvas=>{
        let dataUrl=canvas.toDataURL();
        // WhatsApp ne supporte pas directement l'image en base64, on partage un texte + lien
        let txt="🎓 Voici mon diplôme Trick Brain ! Score: "+correctCount+"/"+currentLevel;
        window.open("https://wa.me/?text="+encodeURIComponent(txt));
      });
    }

    // ▶️ Continuer le jeu
    function continueGame(){
      document.getElementById("diplomaModal").style.display="none";
      loadLevelData();
      document.getElementById("nextBtn").style.display="none";
    }

    window.onload=()=>{
      loadLevelData();
      document.getElementById("shareBtn").onclick = async () => {
        let txt = "😏 Teste ton cerveau avec Trick Brain ! " + location.href;

        if (navigator.share) {
          try {
            await navigator.share({
              title: "Trick Brain",
              text: txt,
              url: location.href
            });
            console.log("Partage réussi !");
          } catch (err) {
            console.error("Erreur lors du partage :", err);
          }
        } else {
          // Fallback si l’API n’est pas supportée
          alert("partage impossible. Copie le lien : " + txt);
        }
      };
      // Ajout d’un son sur tous les boutons
      document.querySelectorAll("button").forEach(btn=>{
        btn.addEventListener("click", ()=>playSound(clickSound));
      });
    };

    let soundEnabled = true;

    // Ouvrir la modale paramètres
    document.getElementById("settingsBtn").onclick = () => {
      document.getElementById("settingsModal").style.display = "block";
    };

    // Fermer la modale
    function closeSettings(){
      document.getElementById("settingsModal").style.display = "none";
    }

    // Copier le lien du jeu
    function copyGameLink(){
      navigator.clipboard.writeText(location.href).then(()=>{
        alert("📋 Lien du jeu copié !");
      });
    }

    // Activer/désactiver le son avec icône
    document.getElementById("soundToggleBtn").onclick = () => {
      soundEnabled = !soundEnabled;
      const btn = document.getElementById("soundToggleBtn");
      if(soundEnabled){
        btn.innerText = "🔊 Son activé";
      }else{
        btn.innerText = "🔇 Son désactivé";
      }
    };

    // Fonction pour jouer un son uniquement si activé
    function playSound(audio){
      if(soundEnabled){
        audio.currentTime = 0;
        audio.play();
      }
    }
  </script>
</body>
</html>
